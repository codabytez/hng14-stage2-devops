<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Job Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
      }
      .job {
        margin: 10px 0;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      .queued {
        color: orange;
      }
      .completed {
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>Job Processor Dashboard</h1>
    <button onclick="submitJob()">Submit New Job</button>
    <div id="result"></div>
    <div id="jobs"></div>

    <script>
      const jobs = {};

      async function submitJob() {
        const res = await fetch("/submit", { method: "POST" });
        const data = await res.json();
        if (data.job_id) {
          jobs[data.job_id] = "queued";
          renderJobs();
          pollJob(data.job_id);
        }
      }

      async function pollJob(job_id) {
        const interval = setInterval(async () => {
          const res = await fetch(`/status/${job_id}`);
          const data = await res.json();
          jobs[job_id] = data.status;
          renderJobs();
          if (data.status === "completed") {
            clearInterval(interval);
          }
        }, 2000);
      }

      function renderJobs() {
        const container = document.getElementById("jobs");
        container.innerHTML = Object.entries(jobs)
          .map(
            ([id, status]) =>
              `<div class="job"><strong>${id}</strong>: <span class="${status}">${status}</span></div>`,
          )
          .join("");
      }
    </script>
  </body>
</html>
